services:
  nextjs:
    build:
      context: .
      dockerfile: nextjs/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3000} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@${POSTGRES_ADDRESS:-db}:5432/${POSTGRES_DB:?}
      - PORT=${PORT:-3000}
      - JWT_SECRET=${JWT_SECRET:?}
      - INTERNAL_SECRET=${INTERNAL_SECRET:?}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - FORTYTWO_CLIENT_ID=${FORTYTWO_CLIENT_ID}
      - FORTYTWO_CLIENT_SECRET=${FORTYTWO_CLIENT_SECRET}
      - FORTYTWO_REDIRECT_URI=${FORTYTWO_REDIRECT_URI}
      - NEXT_PUBLIC_GAMESERVER_URL=${NEXT_PUBLIC_GAMESERVER_URL}
      - SERVICE_URL_NEXTJS=${SERVICE_URL_NEXTJS:-http://localhost:${PORT}}
      - MAX_USERS=${MAX_USERS}
    env_file:
      - .env

  gamesserver:
    build:
      context: .
      dockerfile: game-server/Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_URL_NEXTJS=${SERVICE_URL_NEXTJS:-http://localhost:${PORT}}
      - INTERNAL_NEXTJS_URL=${INTERNAL_NEXTJS_URL:-http://nextjs:${PORT}}
      - INTERNAL_SECRET=${INTERNAL_SECRET:?}
      - GAME_TIMED_MODE_SECONDS=${GAME_TIMED_MODE_SECONDS:-600}
    env_file:
      - .env

  db:
    image: postgres:16-alpine
    container_name: transcendence_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?}
      - POSTGRES_DB=${POSTGRES_DB:?}
    env_file:
      - .env

volumes:
  postgres_data:
