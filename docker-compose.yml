services:
  next-js:
    expose:
      - "3000"
    ports:
      - "${PORT}:${PORT}"
    build:
      context: .
      dockerfile: nextjs/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  gamesserver:
    build:
      context: .
      dockerfile: game-server/Dockerfile
    expose:
      - "4000"
    ports:
      - "4000:4000"

  db:
    image: postgres:16-alpine
    container_name: transcendence_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
