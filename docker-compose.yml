services:
  nextjs:
    expose:
      - "3000"
    build:
      context: .
      dockerfile: nextjs/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@${DATABASE_ADDRESS:-db}:5432/${POSTGRES_DB:?}
      - PORT=${PORT:-3000}
      - JWT_SECRET=${JWT_SECRET:?}

  gamesserver:
    build:
      context: .
      dockerfile: game-server/Dockerfile
    expose:
      - "4000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: transcendence_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?}
      - POSTGRES_PASSWORD${POSTGRES_PASSWORD:?}
      - POSTGRES_DB=${POSTGRES_DB:?}

volumes:
  postgres_data:
