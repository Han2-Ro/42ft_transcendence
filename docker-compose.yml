services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

  nextjs:
    build:
      context: .
      dockerfile: nextjs/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3000} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@${POSTGRES_ADDRESS:-db}:5432/${POSTGRES_DB:?}
      - PORT=${PORT:-3000}
      - JWT_SECRET=${JWT_SECRET:?}
      - INTERNAL_SECRET=${INTERNAL_SECRET:?}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextjs.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.nextjs.entrypoints=websecure"
      - "traefik.http.routers.nextjs.tls=true"
      - "traefik.http.services.nextjs.loadbalancer.server.port=${PORT:-3000}"

  gamesserver:
    build:
      context: .
      dockerfile: game-server/Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_URL_NEXTJS=${SERVICE_URL_NEXTJS:-http://localhost:${PORT}}
      - INTERNAL_NEXTJS_URL=${INTERNAL_NEXTJS_URL:-http://nextjs:${PORT}}
      - INTERNAL_SECRET=${INTERNAL_SECRET:?}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gamesserver.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/socket.io`)"
      - "traefik.http.routers.gamesserver.entrypoints=websecure"
      - "traefik.http.routers.gamesserver.tls=true"
      - "traefik.http.services.gamesserver.loadbalancer.server.port=4000"

  db:
    image: postgres:16-alpine
    container_name: transcendence_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?}
      - POSTGRES_DB=${POSTGRES_DB:?}

volumes:
  postgres_data:
