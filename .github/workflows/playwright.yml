name: Playwright Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat <<EOF > .env
          PORT=8080
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=transcendence_db
          DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@db:5432/transcendence_db
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET=your-secure-internal-secret-here
          SERVICE_URL_NEXTJS=https://localhost
          EOF

      - name: Start services
        run: make run || (docker compose logs && exit 1)

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install
        working-directory: tests

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium firefox webkit
        working-directory: tests

      - name: Wait for Next.js to be ready
        run: |
          echo "Waiting for app on port 8080..."
          for i in $(seq 1 10); do
            if curl -sfk https://localhost > /dev/null 2>&1; then
              echo "App is ready."
              exit 0
            fi
            echo "Attempt $i/10 - not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "App did not become ready in time."
          docker compose logs
          exit 1

      - name: Run Playwright tests
        run: pnpm test:all || (docker compose logs && exit 1)
        working-directory: tests

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose down -v
